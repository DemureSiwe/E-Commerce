<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Jost:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />

    <title>E-Commerce Website</title>
  </head>
  <body>
    <header>
      <a href="#" class="logo">Busi & Co.</a>

      <ul class="navlist">
        <li><a href="#">Home</a></li>
        <li><a href="#">Pages</a></li>
        <li><a href="#">Women</a></li>
        <li><a href="#">Men</a></li>
        <li><a href="#">Shop</a></li>
        <li><a href="#">Blog</a></li>
        <li><a href="#">Contact</a></li>
      </ul>

      <div class="navRight">
        <a href="#"><i class="fa-solid fa-user"></i></a>
        <a href="#"><i class="fa-solid fa-heart"></i></a>
        <a href="#"><i class="fa-solid fa-cart-shopping"></i></a>
        <div id="menuIcon"><i class="fa-solid fa-bars"></i></div>
      </div>
    </header>

    <!--Home-->
    <section class="home">
      <div class="homeText">
        <h5>Think Creative</h5>
        <h1>Trendy Luxury Craft</h1>
        <p>Creating smiles and spreading happiness for generations!</p>
        <a href="#" class="btn">
          <i class="fa-solid fa-cart-arrow-down"></i>Shop now</a
        >
      </div>

      <div class="homeImg">
        <img src="images/home.png" alt="" />
      </div>
    </section>

    <!--crafts area-->
    <section class="crafts">
      <div class="craftsContent">
        <div class="craftBox">
          <img src="images/c1.jpg" alt="" />
          <h6>6 items</h6>
          <h3>Handicrafts</h3>
          <a href="#" class="crafts-btn"
            ><i class="fa-solid fa-cart-arrow-down"></i>Shop Now</a
          >
        </div>

        <div class="craftBox">
          <img src="images/c2.jpg" alt="" />
          <h6>6 items</h6>
          <h3>Handicrafts</h3>
          <a href="#" class="crafts-btn"
            ><i class="fa-solid fa-cart-arrow-down"></i> Shop Now</a
          >
        </div>

        <div class="craftBox">
          <img src="images/c3.jpg" alt="" />
          <h6>6 items</h6>
          <h3>Handicrafts</h3>
          <a href="#" class="crafts-btn"
            ><i class="fa-solid fa-cart-arrow-down"></i> Shop Now</a
          >
        </div>
      </div>
    </section>

    <script
      src="https://kit.fontawesome.com/0604c62f53.js"
      crossorigin="anonymous"
    ></script>

    <script src="./scripts.js"></script>
  </body>
</html>
